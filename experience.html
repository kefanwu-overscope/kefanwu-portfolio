<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Step into Kefan Wu's interactive 3D studio: an engineering room where the resume sits on the desk and project models open full case studies. A WebGL companion to the main portfolio."
    />
    <!-- The static homepage is the canonical, crawlable surface. -->
    <link rel="canonical" href="https://www.kefanwu.com/" />
    <meta property="og:title" content="Kefan Wu — Interactive 3D Studio" />
    <meta
      property="og:description"
      content="An interactive 3D engineering studio: click the resume on the desk, click project models for case studies."
    />
    <meta property="og:image" content="assets/studio-hover.webp" />
    <meta property="og:image:width" content="1280" />
    <meta property="og:image:height" content="800" />
    <meta property="og:type" content="website" />
    <title>Kefan Wu | Interactive 3D Studio</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="assets/favicon_custom.png" sizes="any" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Inter+Tight:wght@600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap"
    />
    <link rel="stylesheet" href="experience.css?v=exp-f1res-20260712" />

    <!-- Three.js import map (pinned, single CDN). -->
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.185.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.185.0/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <!-- Always-visible, keyboard-focusable escape hatch to the classic site -->
    <div class="exp-topbar">
      <a class="exp-brand" href="index.html#top" aria-label="Kefan Wu — home">
        <span class="brand-mark" aria-hidden="true">KW</span>
        <span class="brand-name">Kefan Wu</span>
      </a>
      <div class="exp-topbar__right">
        <button class="exp-sound" id="exp-sound" type="button" aria-label="Enable sound">
          <svg class="snd-off" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polygon points="7.3 3.3 4 6 1.3 6 1.3 10 4 10 7.3 12.7 7.3 3.3"></polygon>
            <line x1="15.3" y1="6" x2="11.3" y2="10"></line>
            <line x1="11.3" y1="6" x2="15.3" y2="10"></line>
          </svg>
          <svg class="snd-on" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polygon points="7.3 3.3 4 6 1.3 6 1.3 10 4 10 7.3 12.7 7.3 3.3"></polygon>
            <path d="M10.4 5.6a3.3 3.3 0 0 1 0 4.8"></path>
            <path d="M12.7 3.3a6.7 6.7 0 0 1 0 9.4"></path>
          </svg>
        </button>
        <a class="exp-hud-link" href="index.html#work">All projects</a>
        <a class="exp-classic-link" href="index.html">
          <span>View classic site</span>
          <span class="arrow" aria-hidden="true">&rarr;</span>
        </a>
      </div>
    </div>

    <!-- hover label + case-study / resume panel -->
    <div class="exp-label" id="exp-label" hidden></div>
    <div class="exp-backdrop" id="exp-backdrop"></div>
    <aside class="exp-panel" id="exp-panel" role="dialog" aria-modal="true" aria-label="Details" aria-live="polite"></aside>
    <div class="exp-sheet" id="exp-paper" role="dialog" aria-label="Resume"></div>
    <div class="exp-lightbox" id="exp-lightbox" role="dialog" aria-label="Image preview"></div>

    <!-- one-time hint: the scene can be dragged to look around -->
    <div class="exp-draghint" id="exp-draghint" hidden aria-hidden="true">
      <span class="exp-draghint__demo" aria-hidden="true">
        <span class="exp-draghint__glow"></span>
        <span class="exp-draghint__chev exp-draghint__chev--l">&#8249;</span>
        <span class="exp-draghint__chev exp-draghint__chev--r">&#8250;</span>
        <span class="exp-draghint__glide">
          <span class="exp-draghint__ring"><span class="exp-draghint__dot"></span></span>
        </span>
      </span>
      <span class="exp-draghint__text">Drag to look around</span>
    </div>
    <!-- follow-up hint: exhibits open case studies -->
    <div class="exp-draghint exp-draghint--click" id="exp-clickhint" hidden aria-hidden="true">
      <span class="exp-draghint__demo" aria-hidden="true">
        <span class="exp-draghint__glow"></span>
        <span class="exp-draghint__ring"><span class="exp-draghint__dot"></span></span>
      </span>
      <span class="exp-draghint__text">Click an exhibit to open its case study</span>
    </div>

    <!-- The 3D scene -->
    <div class="exp-stage">
      <canvas id="exp-canvas" tabindex="0" role="application" aria-label="Interactive 3D studio. Use arrow keys to browse exhibits, Enter to open, Escape to close."></canvas>
    </div>

    <!-- Accessible heading (visually hidden; the experience is the canvas) -->
    <h1 class="sr-only">Kefan Wu — interactive 3D engineering studio</h1>

    <!-- Brief loader; fades out once the scene is ready -->
    <div class="exp-loader" id="exp-loader" role="status" aria-live="polite">
      <div class="exp-loader__inner">
        <span class="exp-loader__mark">KW</span>
        <span class="exp-loader__bar"><i></i></span>
        <span class="exp-loader__text">Entering the studio</span>
      </div>
    </div>

    <noscript>
      <div style="text-align:center;color:#a1a1a6;padding:3rem 1.5rem;font-family:sans-serif">
        <h2 style="font-weight:700">Kefan Wu — Interactive 3D Studio</h2>
        <p>This interactive 3D view needs JavaScript.</p>
        <p><a href="index.html" style="color:#3f8cff">View the classic portfolio &rarr;</a></p>
      </div>
    </noscript>

    <script src="project-data.js?v=polish-20260708"></script>
    <script type="module" src="experience.js?v=exp-f1res-20260712"></script>
  </body>
</html>
