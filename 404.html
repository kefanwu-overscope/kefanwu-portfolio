<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>404 — Kefan Wu</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Inter+Tight:wght@600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap"
    />
    <style>
      :root {
        --ink: #f5f5f7;
        --muted: #9a9aa5;
        --accent: #3f8cff;
        --bg: #000000;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
      }

      body {
        min-height: 100vh;
        background: var(--bg);
        color: var(--ink);
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .wrap {
        max-width: 560px;
        width: 100%;
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 18px;
      }

      .kicker {
        font-family: "IBM Plex Mono", "Courier New", monospace;
        font-size: 12px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--accent);
      }

      h1 {
        font-family: "Inter Tight", "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
        font-weight: 800;
        letter-spacing: -0.02em;
        font-size: clamp(28px, 5vw, 40px);
        line-height: 1.15;
        margin: 0;
        color: var(--ink);
      }

      p {
        margin: 0;
        color: var(--muted);
        font-size: 15px;
        line-height: 1.6;
      }

      .actions {
        margin-top: 12px;
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        justify-content: center;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 12px 22px;
        border-radius: 999px;
        font-size: 14px;
        font-weight: 600;
        text-decoration: none;
        transition: transform 0.15s ease, opacity 0.15s ease;
        border: 1px solid transparent;
      }

      .btn:hover {
        transform: translateY(-1px);
      }

      .btn-primary {
        background: var(--accent);
        color: #04070d;
      }

      .btn-primary:hover {
        opacity: 0.9;
      }

      .btn-secondary {
        background: transparent;
        color: var(--ink);
        border-color: rgba(245, 245, 247, 0.24);
      }

      .btn-secondary:hover {
        border-color: var(--accent);
        color: var(--accent);
      }

      @media (max-width: 720px) {
        .actions {
          flex-direction: column;
          width: 100%;
        }

        .btn {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <span class="kicker">ERR 404 / PAGE NOT FOUND</span>
      <h1>This page took a wrong turn.</h1>
      <p>The link may be broken or the page may have moved.</p>
      <div class="actions">
        <a class="btn btn-primary" href="index.html#work">View projects</a>
        <a class="btn btn-secondary" href="experience.html">Enter the 3D Studio</a>
      </div>
    </div>
  </body>
</html>
